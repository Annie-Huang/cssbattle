<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0"
    />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>Document</title>
    <style>
      body {
        height: 100vh;
        width: 100vw;

        margin: 0;
        display: grid;
        place-content: center;
        background: #6bcf87;
      }
      div {
        width: 220px;
        aspect-ratio: 1;
        border-radius: 999px;
        background: #294c0e;
        box-shadow:
          inset 0 0 0 20px #294c0e,
          inset 0 0 0 50px #6bcf87,
          inset 0 0 0 70px #294c0e,
          inset 0 0 0 110px #6bcf87;
        position: relative;
        overflow: hidden;
        &::after {
          content: '';
          position: absolute;
          height: 50%;
          width: 100%;
          top: 0;
          background: #294c0e;
        }
      }
    </style>
  </head>
  <body>
    <div></div>
  </body>
</html>
